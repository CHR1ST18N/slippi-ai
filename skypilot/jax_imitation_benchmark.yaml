resources:
  accelerators: RTX4090:1
  memory: 16+
  cloud: vast
  image_id: docker:vladfi/slippi-ai:jax
  disk_size: 8

  autostop:
    idle_minutes: 10
    down: true  # Use autodown.

config:
  vast:
    create_instance_kwargs:
      args: --gpus all --ipc=host --ulimit memlock=-1 --ulimit stack=67108864
      order: 'dlperf_usd-'
      query:
        - "cuda_vers>=13.0"

envs:
  MODEL_SIZE: 512

num_nodes: 1  # Number of VMs to launch

# Working directory (optional) containing the project codebase.
# Its contents are synced to ~/sky_workdir/ on the cluster.
workdir: .

# Commands to be run before executing the job.
# Typical use: pip install -r requirements.txt, git clone, etc.
setup: |
  cd ~/sky_workdir/
  pip install -r jax-requirements.txt
  pip install .[jax]

# Commands to run as a job.
# Typical use: launch the main program.
run: |
  cd ~/sky_workdir/
  python slippi_ai/jax/launch_scripts/imitation/tx_like.py \
    --toy_data --config.runtime.max_step=200 \
    --net.hidden_size ${MODEL_SIZE}
